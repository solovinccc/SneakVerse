spring.application.name=sneakverse-auth

server.port=8083

spring.datasource.url = jdbc:mysql://host.docker.internal:3306/sneakverse?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username = root
spring.datasource.password = root
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.org.springframework.security=TRACE
logging.level.com.vincenzolisi.sneakverseauth=DEBUG

spring.data.redis.host=redis
spring.data.redis.port=6379

jwt.secret=SneakVerseSecretKey2024!!SneakVerseSecretKey2024!!
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800

session.key-prefix=session:
session.ttl-seconds=900
session.refresh-token-prefix=refresh:
session.blacklist-prefix=blacklist: